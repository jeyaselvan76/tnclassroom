<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMMS Model Test Portal - TN Classroom</title>
    <script src="/tailwind.js"></script>
    <link rel="stylesheet" href="/fontawesome.css">

    <!-- MARKED.JS CDN for Parsing Text/Markdown Files -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- MATHJAX CDN for Formula Rendering -->
    <script>
      window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            processEscapes: true
        },
        options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        .dropdown-menu { z-index: 50 !important; pointer-events: none; }
        .dropdown-active { opacity: 1 !important; visibility: visible !important; transform: translateY(0) !important; z-index: 50 !important; pointer-events: auto !important; }
        .tamil-fix { font-family: 'Segoe UI', 'Latha', 'Apple Tamil', 'Noto Sans Tamil', sans-serif !important; }

        .markdown-body h1 { font-size: 1.5rem; font-weight: 800; margin-top: 1rem; margin-bottom: 0.5rem; color: #0f172a; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin-top: 0.875rem; margin-bottom: 0.5rem; color: #1e293b; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 700; margin-top: 0.75rem; margin-bottom: 0.375rem; color: #334155; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-body ol { list-style-type: decimal; padding-left: 1.25rem; margin-bottom: 0.75rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body strong { font-weight: 800; color: #0f172a; }

        @media print {
            .no-print { display: none !important; }
            body * { visibility: hidden; }
            #content-display-card, #content-display-card * { visibility: visible; }
            #content-display-card { position: absolute; left: 0; top: 0; width: 100%; border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen font-sans">

    <!-- Global Dynamic Navbar -->
    <div id="navbar-placeholder" class="no-print"></div>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-8 space-y-6">

        <!-- Header Banner -->
        <div class="bg-white border border-slate-200/60 rounded-3xl p-6 md:p-8 shadow-sm space-y-4 no-print">
            <div class="flex items-center gap-3 border-b border-slate-100 pb-4">
                <div class="w-10 h-10 rounded-2xl bg-emerald-50 border border-emerald-100 flex items-center justify-center text-emerald-600 font-bold">
                    <i class="fa-solid fa-file-pen text-lg"></i>
                </div>
                <div>
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest font-mono">NMMS Portal</span>
                    <h1 class="text-xl md:text-2xl font-black text-slate-900 tracking-tight">NMMS Model Test Center</h1>
                </div>
            </div>

            <!-- Subject & Test Selection Form -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">

                <!-- Subject Selection -->
                <div>
                    <label for="select-subject" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">
                        <i class="fa-solid fa-book text-emerald-500 mr-1"></i> Select Subject
                    </label>
                    <select id="select-subject" onchange="onSubjectChange()" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-slate-800 focus:outline-none focus:border-emerald-500 transition cursor-pointer">
                        <option value="">-- Choose Subject --</option>
                    </select>
                </div>

                <!-- Test Selection -->
                <div>
                    <label for="select-test" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">
                        <i class="fa-solid fa-list-check text-emerald-500 mr-1"></i> Select Model Test
                    </label>
                    <select id="select-test" onchange="onTestChange()" disabled class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm font-bold text-slate-800 focus:outline-none focus:border-emerald-500 transition cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                        <option value="">-- Choose Test --</option>
                    </select>
                </div>

            </div>
        </div>

        <!-- Inline Content Display Card -->
        <div id="content-display-card" class="hidden bg-white border border-slate-200/60 rounded-3xl p-6 md:p-8 shadow-sm space-y-6">

            <!-- Card Header & Start Test Button -->
            <div class="flex flex-wrap justify-between items-center gap-4 border-b border-slate-100 pb-4 no-print">
                <div>
                    <span id="display-test-badge" class="text-[10px] font-black text-emerald-700 bg-emerald-50 border border-emerald-100 px-3 py-1 rounded-md uppercase tracking-wider">Model Test</span>
                    <h2 id="display-test-title" class="text-lg font-black text-slate-900 mt-1 tamil-fix">Test Title</h2>
                </div>

                <div class="flex items-center gap-2">
                    <button id="btn-start-mcq" onclick="launchMcqTest()" class="bg-emerald-600 hover:bg-emerald-700 text-white border border-emerald-600 rounded-xl px-4 py-2.5 text-xs font-black transition shadow-md shadow-emerald-600/20 flex items-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-circle-play text-sm"></i> Start Online MCQ Test
                    </button>
                    <button onclick="window.print()" class="text-slate-600 hover:text-emerald-600 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-bold transition bg-white cursor-pointer">
                        <i class="fa-solid fa-print"></i>
                    </button>
                </div>
            </div>

            <!-- Content Area for `.txt` file rendering -->
            <div id="text-file-content" class="text-slate-800 font-sans leading-relaxed tracking-wide select-text tamil-fix text-base markdown-body"></div>

        </div>

    </main>

    <!-- Introductory Content Card (Loaded automatically from intro.txt for AdSense & SEO) -->
<div id="intro-content-card" class="bg-white border border-slate-200/60 rounded-3xl p-6 md:p-8 shadow-sm space-y-4">
    <div class="flex items-center gap-2 border-b border-slate-100 pb-3">
        <i class="fa-solid fa-circle-info text-emerald-500"></i>
        <h2 class="text-sm font-black text-slate-700 uppercase tracking-wider">About NMMS Model Test Portal</h2>
    </div>
    <div id="intro-text-body" class="text-slate-800 font-sans leading-relaxed tracking-wide select-text tamil-fix text-base markdown-body">
        <div class="text-slate-400 text-xs py-2 font-medium">
            <i class="fa-solid fa-circle-notch fa-spin text-emerald-500 mr-2"></i>Loading introductory guide...
        </div>
    </div>
</div>

    <footer class="bg-slate-950 text-slate-400 border-t border-slate-800 py-6 text-center text-xs mt-auto space-y-4 no-print">
        <nav class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-xs font-bold text-slate-400">
            <a href="/about-us.html" class="hover:text-emerald-400 transition">About Us</a>
            <a href="/privacy-policy.html" class="hover:text-emerald-400 transition">Privacy Policy</a>
            <a href="/disclaimer.html" class="hover:text-emerald-400 transition">Disclaimer</a>
            <a href="/contact-us.html" class="hover:text-emerald-400 transition">Contact Us</a>
        </nav>
        <p>&copy; 2026 tnclassroom.com | A Professional Learning Platform for Students & Teachers</p>
    </footer>

   <script>
    const DATABASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8EIzPwML5dvFFtNUyH6P9bVpenyTRdtW5L-SQa6UA8xQreUcCyCbK0PqxecaMxOTvwuRgpCrGKSCA/pub?gid=273942769&single=true&output=csv";
    let activeRecord = null;

    function parseCsvRows(text) {
        let lines = []; let row = []; let cell = ''; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c === '"') { inQuotes = !inQuotes; }
            else if (c === ',' && !inQuotes) { row.push(cell.trim()); cell = ''; }
            else if ((c === '\n' || c === '\r') && !inQuotes) {
                row.push(cell.trim());
                if (row.length > 0 && row.some(x => x !== '')) lines.push(row);
                row = []; cell = '';
                if (c === '\r' && text[i+1] === '\n') i++;
            } else { cell += c; }
        }
        if (cell || row.length > 0) { row.push(cell.trim()); lines.push(row); }
        return lines;
    }

    function sanitizeTamilMathJax(content) {
        if (!content) return "";
        let clean = content;

        clean = clean.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '');
        clean = clean.replace(/<[\s\S]*?>/gi, '');

        while (/\\text\s*\{([^{}]*)\}/.test(clean)) {
            clean = clean.replace(/\\text\s*\{([^{}]*)\}/g, '$1');
        }

        clean = clean.replace(/(\$\$[\s\S]*?\$\$|\$[^\$\n]+?\$)/g, (mathBlock) => {
            if (!/[\u0B80-\u0BFF]/.test(mathBlock)) return mathBlock;

            let str = mathBlock.replace(/^\$\$?|\$\$?$/g, '');
            str = str.replace(/\\frac\s*\{([^{}]*)\}\s*\{([^{}]*)\}/g, (m, num, den) => {
                let cleanNum = num.replace(/\\/g, '').trim();
                let cleanDen = den.replace(/\\/g, '').trim();
                return `<span class="inline-flex flex-col items-center justify-center align-middle mx-1 font-bold text-slate-800"><span class="border-b border-slate-700 px-1 pb-0.5">${cleanNum}</span><span class="px-1 pt-0.5">${cleanDen}</span></span>`;
            });

            str = str.replace(/\\times/g, ' × ');
            str = str.replace(/\\div/g, ' ÷ ');
            str = str.replace(/\\([^\sA-Za-z0-9])/g, '$1');
            return `<span class="tamil-fix font-medium">${str}</span>`;
        });

        return clean;
    }

    // Load intro.txt on initial page load for Google AdSense & SEO
    async function fetchIntroText() {
        const introBody = document.getElementById('intro-text-body');
        try {
            const res = await fetch('./intro.txt');
            if (!res.ok) throw new Error("intro.txt not found");
            let rawTxt = await res.text();

            let cleanTxt = sanitizeTamilMathJax(rawTxt);
            let parsedHtml = (typeof marked !== 'undefined') ? marked.parse(cleanTxt) : `<p class="whitespace-pre-wrap">${cleanTxt}</p>`;
            introBody.innerHTML = parsedHtml;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([introBody]);
            }
        } catch (err) {
            console.error("Intro text fetch failed:", err);
            introBody.innerHTML = `<p class="text-xs text-slate-500 font-medium">Welcome to the NMMS Model Test Portal. Select a subject and test above to begin practicing.</p>`;
        }
    }

    async function fetchModelTestDatabase() {
        try {
            const res = await fetch(DATABASE_CSV_URL);
            if (!res.ok) throw new Error("Database network fetch failed");
            const txt = await res.text();
            const lines = parseCsvRows(txt);

            const dataRows = lines.slice(1);
            rawDatabaseRecords = dataRows.map((cols, idx) => {
                let subjVal    = cols[0] ? cols[0].replace(/^"|"$/g, '').trim() : '';
                let testNoVal  = cols[1] ? cols[1].replace(/^"|"$/g, '').trim() : '';
                let testNameVal= cols[2] ? cols[2].replace(/^"|"$/g, '').trim() : '';
                let fileUrlVal = cols[3] ? cols[3].replace(/^"|"$/g, '').trim() : '#';
                let mcqUrlVal  = cols[4] ? cols[4].replace(/^"|"$/g, '').trim() : '#';

                let displayTitle = testNameVal ? `Test ${testNoVal}: ${testNameVal}` : `Model Test ${testNoVal || idx + 1}`;

                return {
                    id: idx,
                    subject: subjVal,
                    testNo: testNoVal,
                    testName: displayTitle,
                    fileUrl: fileUrlVal,
                    mcqUrl: mcqUrlVal
                };
            });

            populateSubjectDropdown();
        } catch (e) {
            console.error("Database initialization failed:", e);
        }
    }

    function populateSubjectDropdown() {
        const subjectSelect = document.getElementById('select-subject');
        const subjects = [...new Set(rawDatabaseRecords.map(r => r.subject).filter(Boolean))];

        subjectSelect.innerHTML = '<option value="">-- Choose Subject --</option>';
        subjects.forEach(subj => {
            const opt = document.createElement('option');
            opt.value = subj;
            opt.innerText = subj;
            subjectSelect.appendChild(opt);
        });
    }

    function onSubjectChange() {
        const selectedSubj = document.getElementById('select-subject').value;
        const testSelect = document.getElementById('select-test');
        const displayCard = document.getElementById('content-display-card');
        const introCard = document.getElementById('intro-content-card');

        displayCard.classList.add('hidden');
        if (introCard) introCard.classList.remove('hidden'); // Keep intro visible until test selected
        testSelect.innerHTML = '<option value="">-- Choose Test --</option>';

        if (!selectedSubj) {
            testSelect.disabled = true;
            return;
        }

        const filterTests = rawDatabaseRecords.filter(r => r.subject === selectedSubj);
        filterTests.forEach(test => {
            const opt = document.createElement('option');
            opt.value = test.id;
            opt.innerText = test.testName;
            testSelect.appendChild(opt);
        });

        testSelect.disabled = false;
    }

    async function onTestChange() {
        const selectedId = document.getElementById('select-test').value;
        const displayCard = document.getElementById('content-display-card');
        const introCard = document.getElementById('intro-content-card');
        const contentBody = document.getElementById('text-file-content');

        if (selectedId === "") {
            displayCard.classList.add('hidden');
            if (introCard) introCard.classList.remove('hidden');
            return;
        }

        activeRecord = rawDatabaseRecords.find(r => r.id == selectedId);
        if (!activeRecord) return;

        // Hide introductory section and reveal test content card
        if (introCard) introCard.classList.add('hidden');
        document.getElementById('display-test-badge').innerText = activeRecord.subject;
        document.getElementById('display-test-title').innerText = activeRecord.testName;
        displayCard.classList.remove('hidden');

        contentBody.innerHTML = `<div class="text-slate-400 text-xs py-4 font-medium"><i class="fa-solid fa-circle-notch fa-spin text-emerald-500 mr-2"></i>Loading test content...</div>`;

        let url = activeRecord.fileUrl;
        if (!url.startsWith('http') && !url.startsWith('/') && !url.startsWith('./')) {
            url = `./${url}`;
        }

        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("Txt file load error");
            let rawTxt = await res.text();

            let cleanTxt = sanitizeTamilMathJax(rawTxt);
            let parsedHtml = (typeof marked !== 'undefined') ? marked.parse(cleanTxt) : `<p class="whitespace-pre-wrap">${cleanTxt}</p>`;
            contentBody.innerHTML = parsedHtml;

            if (window.MathJax && window.MathJax.typesetPromise) {
                window.MathJax.typesetPromise([contentBody]);
            }
        } catch (err) {
            console.error(err);
            contentBody.innerHTML = `<div class="text-red-500 font-bold text-xs p-3 bg-red-50 rounded-xl border border-red-100">Failed to render test content file from server.</div>`;
        }
    }

    function launchMcqTest() {
        if (!activeRecord) return;
        if (activeRecord.mcqUrl && activeRecord.mcqUrl !== '#') {
            window.location.href = activeRecord.mcqUrl;
        } else {
            window.location.href = `/nmms-model-test/test.html?id=${activeRecord.id}`;
        }
    }

    async function loadSharedSiteNavbar() {
        try {
            const res = await fetch(`../navbar.html?v=${new Date().getTime()}`);
            if (res.ok) {
                document.getElementById('navbar-placeholder').innerHTML = await res.text();
                initializeGlobalNavigationHooks();
            }
        } catch (e) { console.error(e); }
    }

    function initializeGlobalNavigationHooks() {
        document.removeEventListener('click', closeAllDropdowns);
        document.addEventListener('click', closeAllDropdowns);
    }

    function toggleNavigationMenu(event, targetMenuId) {
        event.stopPropagation();
        const targetMenu = document.getElementById(targetMenuId);
        if (!targetMenu) return;
        if (targetMenuId.includes('mobile-')) {
            const isHidden = targetMenu.classList.contains('hidden');
            document.querySelectorAll('[id*="mobile-menu-"]').forEach(m => m.classList.add('hidden'));
            if (isHidden) targetMenu.classList.remove('hidden');
        } else {
            const isOpen = targetMenu.classList.contains('dropdown-active');
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('dropdown-active'));
            if (!isOpen) targetMenu.classList.add('dropdown-active');
        }
    }

    function toggleMobileMenu(open) {
        const drawer = document.getElementById('mobile-drawer');
        const content = document.getElementById('drawer-content');
        if (!drawer || !content) return;
        if (open) {
            drawer.classList.remove('invisible');
            setTimeout(() => content.classList.remove('translate-x-full'), 10);
        } else {
            content.classList.add('translate-x-full');
            setTimeout(() => drawer.classList.add('invisible'), 300);
        }
    }

    function closeAllDropdowns() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('dropdown-active'));
        document.querySelectorAll('[id*="mobile-menu-"]').forEach(m => m.classList.add('hidden'));
    }

    window.addEventListener('DOMContentLoaded', () => {
        loadSharedSiteNavbar();
        fetchIntroText();          // Fetch & render intro.txt immediately
        fetchModelTestDatabase(); // Load CSV test records
    });
</script>
</body>
</html>
