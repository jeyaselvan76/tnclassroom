<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN Classroom | Professional Educational Repository</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dropdown-active { opacity: 1 !important; visibility: visible !important; transform: translateY(0) !important; }
        .tamil-fix { font-family: 'Segoe UI', 'Latha', sans-serif !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <div class="w-full bg-white border-b border-slate-200 py-2 flex justify-center items-center text-[10px] text-gray-400 font-sans">
        <div class="text-center">
            <span class="block uppercase tracking-wider font-semibold mb-1">Advertisement</span>
            <div class="bg-gray-100 border border-dashed border-gray-300 w-[320px] h-[50px] md:w-[728px] md:h-[90px] flex items-center justify-center rounded font-mono">
                Top Leaderboard Banner Ad Box
            </div>
        </div>
    </div>

    <div id="navbar-placeholder"></div>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-2xl p-6 md:p-8 shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="space-y-3 max-w-xl">
                <span class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-1 rounded-full uppercase tracking-wider">Official Portal</span>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight sm:text-4xl">TN Classroom Repository</h1>
                <p class="text-slate-600 text-base leading-relaxed">Modernized bilingual resources dashboard optimized for TNTET, NMMS, and textbook data access tracks.</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-400 border-t border-slate-800 py-6 text-center text-xs mt-auto">
        <p>&copy; 2026 TN Classroom. All rights reserved.</p>
    </footer>

    <script>
        // 1. DYNAMIC NAVBAR LOADER (Loads from local directory for testing, with cache-busting token)
        async function loadSharedSiteNavbar() {
            try {
                const cacheBusterToken = new Date().getTime();

                // Pointing to relative path so it loads immediately on localhost server configurations
                const localNavbarUrl = `./navbar.html?v=${cacheBusterToken}`;

                const response = await fetch(localNavbarUrl);
                if (!response.ok) throw new Error("Root workspace navbar asset extraction mismatch.");

                const htmlContent = await response.text();
                document.getElementById('navbar-placeholder').innerHTML = htmlContent;

                initializeDropdownListeners();
            } catch (error) {
                console.error("Error loading shared navigation bar component:", error);
            }
        }

        // 2. CONSOLIDATED NAVIGATION ROUTING TOGGLE (Desktop + Mobile Sync Mechanics)
        function toggleNavigationMenu(event, targetMenuId) {
            event.stopPropagation();
            const targetMenu = document.getElementById(targetMenuId);
            if (!targetMenu) return;

            const isMobileMenu = targetMenuId.includes('mobile-');

            if (isMobileMenu) {
                // Mobile Accordion Mechanism
                const isHidden = targetMenu.classList.contains('hidden');

                document.querySelectorAll('[id*="mobile-menu-"]').forEach(menu => {
                    menu.classList.add('hidden');
                });

                if (isHidden) {
                    targetMenu.classList.remove('hidden');
                }
            } else {
                // Desktop Dropdown Floating Menu Mechanism
                const isOpen = targetMenu.classList.contains('dropdown-active');

                document.querySelectorAll('.dropdown-menu').forEach(menu => {
                    menu.classList.remove('dropdown-active');
                });

                if (!isOpen) {
                    targetMenu.classList.add('dropdown-active');
                }
            }
        }

        function toggleMobileMenu(open) {
            const drawer = document.getElementById('mobile-drawer');
            const content = document.getElementById('drawer-content');
            if (!drawer || !content) return;

            if (open) {
                drawer.classList.remove('invisible');
                setTimeout(() => content.classList.remove('translate-x-full'), 10);
            } else {
                content.classList.add('translate-x-full');
                setTimeout(() => drawer.classList.add('invisible'), 300);
            }
        }

        function initializeDropdownListeners() {
            document.removeEventListener('click', closeAllDropdowns);
            document.addEventListener('click', closeAllDropdowns);
        }

        function closeAllDropdowns() {
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                menu.classList.remove('dropdown-active');
            });
            document.querySelectorAll('[id*="mobile-menu-"]').forEach(menu => {
                menu.classList.add('hidden');
            });
        }

        window.addEventListener('DOMContentLoaded', loadSharedSiteNavbar);
    </script>
</body>
</html>
